name: Build and Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Build Jekyll
        run: bundle exec jekyll build
      - name: Install StatiCrypt
        run: npm install -g staticrypt
      - name: Encrypt diary pages
        run: |
          staticrypt _site/diary/index.html \
            -p ${{ secrets.DIARY_PASSWORD }} \
            -o _site/diary/index.html
      - name: Check encrypted output
        run: |
          head -50 _site/diary/index.html
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
